<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据管理总览</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft YaHei", sans-serif; overflow: hidden; }
        #container { display: flex; height: 100vh; width: 100vw; }
        
        /* 侧边栏样式 */
        #sidebar { width: 220px; background: #2c3e50; color: white; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        #sidebar .header { padding: 20px; font-size: 18px; font-weight: bold; background: #1a252f; border-bottom: 1px solid #34495e; }
        
        .nav-item { 
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #34495e; transition: 0.3s;
            font-size: 14px; display: flex; align-items: center;
        }
        .nav-item:hover { background: #34495e; }
        .nav-item.active { background: #3498db; border-left: 5px solid #fff; }

        /* 内容区样式 */
        #content { flex-grow: 1; background: #f4f7f6; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* 遮罩层，防止加载前的空白 */
        #loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 14px; color: #95a5a6; display: none; 
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="container">
    <div id="sidebar">
        <div class="header">数据分析系统</div>
        <div class="nav-item active" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9nUXE5')">● 总览看板</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9wak13')">● 工单解决率</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay8wc2p0')">● 兜底量/介入量</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9ab1ZR')">● 闭环率</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay96N1di')">● 抖音工单</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay81RHZB')">● 质检看板</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9LY29l')">● 95看板</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9iSGk0')">● 圆准达</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9rTTlF')">● 产品指标</div>
        <div class="nav-item" onclick="loadPage(this, 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9xbVZZ')">● 同行对比</div>
    </div>
    
    <div id="content">
        <div id="loader">加载中...</div>
        <iframe id="mainFrame" src=""></iframe>
    </div>
</div>

<script>
    // 页面初始化加载第一个
    window.onload = function() {
        const firstPage = 'aHR0cHM6Ly9kZW1vLmZhbnJ1YW4uY29tL3dlYnJvb3QvZGVjaXNpb24vbGluay9nUXE5';
        document.getElementById('mainFrame').src = atob(firstPage);
    };

    function loadPage(element, encodedUrl) {
        // 切换Active类
        const items = document.querySelectorAll('.nav-item');
        items.forEach(item => item.classList.remove('active'));
        element.classList.add('active');

        // 解码并加载
        const frame = document.getElementById('mainFrame');
        const loader = document.getElementById('loader');
        
        loader.style.display = 'block';
        frame.style.display = 'none';

        // 使用 atob 解码 Base64 链接
        frame.src = atob(encodedUrl);

        frame.onload = function() {
            loader.style.display = 'none';
            frame.style.display = 'block';
        };
    }

    // 进阶防御：禁止 F12
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
            return false;
        }
    };
</script>

</body>
</html>
