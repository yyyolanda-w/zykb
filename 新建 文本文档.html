<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>zykb</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: "Microsoft YaHei", sans-serif; overflow: hidden; background: #f0f2f5; }
        #sidebar { width: 220px; background: #001529; color: rgba(255,255,255,0.65); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 20px; color: white; font-size: 18px; font-weight: bold; background: #002140; text-align: center; }
        .nav-group { flex: 1; overflow-y: auto; }
        .nav-item { padding: 12px 24px; cursor: pointer; transition: all 0.3s; border-left: 4px solid transparent; border-bottom: 1px solid #002140; }
        .nav-item:hover { color: white; background: #7722a8; }
        .active { color: white !important; background: #7722a8 !important; border-left: 4px solid #fff; }
        #content-container { flex: 1; display: flex; flex-direction: column; }
        #content { flex: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="sidebar">
        <div class="sidebar-header">看板管理</div>
        <div class="nav-group">
            <div class="nav-item" data-id="gQq9" onclick="load(this)">总览</div>
            <div class="nav-item" data-id="pjMw" onclick="load(this)">工单解决率</div>
            <div class="nav-item" data-id="0sjt" onclick="load(this)">兜底量/介入量</div>
            <div class="nav-item" data-id="ZoVQ" onclick="load(this)">闭环率</div>
            <div class="nav-item" data-id="z7Wb" onclick="load(this)">抖音工单</div>
            <div class="nav-item" data-id="5DvA" onclick="load(this)">质检</div>
            <div class="nav-item" data-id="Kcoe" onclick="load(this)">95看板</div>
            <div class="nav-item" data-id="bHi4" onclick="load(this)">圆准达</div>
            <div class="nav-item" data-id="kM9E" onclick="load(this)">产品指标</div>
            <div class="nav-item" data-id="qmVY" onclick="load(this)">同行对比</div>
            <div class="nav-item" data-id="CjQl" onclick="load(this)">在线</div>
            <div class="nav-item" data-id="NgiX" onclick="load(this)">话务</div>
        </div>
    </div>

    <div id="content-container">
        <iframe id="content" src="about:blank"></iframe>
    </div>

    <script>
        function load(el) {
            const id = el.getAttribute('data-id');
            const prefix = "h"+"t"+"t"+"p"+"s"+":"+"/"+"/"+"d"+"e"+"m"+"o"+".f"+"a"+"n"+"r"+"u"+"a"+"n"+".c"+"o"+"m"+"/"+"w"+"e"+"b"+"r"+"o"+"o"+"t"+"/"+"d"+"e"+"c"+"i"+"s"+"i"+"o"+"n"+"/"+"l"+"i"+"n"+"k"+"/";
            const targetUrl = prefix + id;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('content').src = targetUrl;
        }
        window.onload = () => {
            const first = document.querySelector('.nav-item');
            if(first) load(first);
        };
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) {
                return false;
            }
        };
    </script>
</body>
</html>
